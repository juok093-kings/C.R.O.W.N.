<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>C.R.O.W.N. AI - Gold Edition</title>
    <style>
        :root { --main-bg: #212121; --gold: #ffd700; }
        body { background-color: var(--main-bg); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: #171717; padding: 10px; border-right: 1px solid #333; }
        .chat-main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        /* DEIN LOGO: Wir nutzen jetzt einen Pfad, den Flask IMMER findet */
        .crown-center img { 
            width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--gold); 
            background: #000; box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }
        
        .input-container { position: absolute; bottom: 40px; width: 80%; max-width: 760px; background: #2f2f2f; border-radius: 24px; padding: 10px 20px; display: flex; align-items: center; border: 1px solid #424242; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 16px; }
        
        /* GOLD-EFFECT: Hier nehmen wir den Internet-Link als Backup */
        .send-btn { 
            background-color: var(--gold);
            background-image: url('https://icons8.com'); 
            background-size: 60%; background-position: center; background-repeat: no-repeat;
            width: 35px; height: 35px; border-radius: 50%; border: none; cursor: pointer; 
        }
        
        #chat-flow { width: 80%; max-width: 760px; flex: 1; overflow-y: auto; display: none; padding-top: 50px; margin-bottom: 120px; }
        .ki-icon { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--gold); background: #000; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="padding: 10px; cursor: pointer; font-weight: bold;" onclick="location.reload()">
            <img src="/static/C.R.O.W.N..png" width="24" style="border-radius: 50%; vertical-align: middle; border: 1px solid var(--gold);"> Neuer Chat
        </div>
    </div>
    <div class="chat-main">
        <div id="start-screen" style="text-align: center;">
            <!-- DEIN ECHTES LOGO AUS DEM STATIC ORDNER -->
            <img src="/static/C.R.O.W.N..png" alt="C.R.O.W.N. Logo" onerror="this.src='https://icons8.com'">
            <h2 style="color: white; margin-top: 20px;">Was geht dir heute durch den Kopf?</h2>
        </div>
        <div id="chat-flow"></div>
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Schreib was und drück ENTER..." onkeypress="if(event.key === 'Enter') senden()">
            <button class="send-btn" onclick="senden()"></button>
        </div>
    </div>
    <script>
        async function senden() {
            let input = document.getElementById("userInput");
            let userVal = input.value.trim();
            if (!userVal) return;

            document.getElementById("start-screen").style.display = "none";
            let flow = document.getElementById("chat-flow");
            flow.style.display = "block";
            flow.innerHTML += `<div style="margin-bottom: 30px;"><b>Du</b><br>${userVal}</div>`;
            input.value = "";

            try {
                const res = await fetch('/get_response', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: userVal })
                });
                const data = await res.json();
                flow.innerHTML += `
                    <div style="margin-bottom: 30px; display: flex; gap: 15px;">
                        <img src="/static/C.R.O.W.N..png" class="ki-icon" onerror="this.src='https://icons8.com'">
                        <div><b>C.R.O.W.N.</b><br>${data.reply}</div>
                    </div>`;
                flow.scrollTop = flow.scrollHeight;
            } catch (e) {
                flow.innerHTML += `<div style="color: #ffd700;">Keine Verbindung zum Server... 💅</div>`;
            }
        }
    </script>
</body>
</html>
